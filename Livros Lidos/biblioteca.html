<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Biblioteca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Meu Servidor</a>

         <div>
            <a class="menu btn btn-outline-light me-2" href="index.html">Inico</a>
            <a class="menu btn btn-outline-light me-2" href="quemsoueu.html">Voltar</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="text-center fw-bold mb-3" style="color: #c73062;">Minha Biblioteca</h1>

    <div class="row" id="lista"></div>
</div>

<script>
    fetch('/api/biblioteca')
        .then(res => res.json())
        .then(biblioteca => {
            const lista = document.getElementById('lista');

            biblioteca.forEach(p => {
                lista.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <div class="card shadow h-100">
                            <div class="card-body text-center">
                                <h5 class="nome card-title">${p.nome}</h5>
                                <p class="nota card-text text-dark fw-bold">
                                    Nota: ${p.nota}
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
</script>

</body>
</html>
